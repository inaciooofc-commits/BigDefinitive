name: Build Big Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build-apk:
    name: Build debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Locate Android project
        id: locate
        run: |
          echo "Procurando pasta android..."
          ANDROID_DIR=$(find . -type f -path "*/android/app/build.gradle" -printf "%h\n" | sed 's#/app$##' | head -1)

          if [ -z "$ANDROID_DIR" ]; then
            echo "ERRO: Não encontrei android/app/build.gradle"
            echo "Arquivos encontrados:"
            find . -maxdepth 5 -type f | sort | head -300
            exit 1
          fi

          echo "Android encontrado em: $ANDROID_DIR"
          echo "android_dir=$ANDROID_DIR" >> "$GITHUB_OUTPUT"

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager "platforms;android-35" "build-tools;35.0.0" "platform-tools"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"

      - name: Build APK
        working-directory: ${{ steps.locate.outputs.android_dir }}
        run: gradle :app:assembleDebug --stacktrace

      - name: Rename APK
        run: |
          mkdir -p apk-output
          APK=$(find "${{ steps.locate.outputs.android_dir }}/app/build/outputs/apk/debug" -name "*.apk" | head -1)

          if [ -z "$APK" ]; then
            echo "ERRO: APK não encontrado."
            find "${{ steps.locate.outputs.android_dir }}" -maxdepth 8 -type f | sort
            exit 1
          fi

          cp "$APK" apk-output/Big-debug.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Big-debug-apk
          path: apk-output/Big-debug.apk
          if-no-files-found: error
